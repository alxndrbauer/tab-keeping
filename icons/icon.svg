<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#1a1a2e"/>

  <!-- Browser tab bar background (centered: y=30 to y=98) -->
  <rect x="12" y="30" width="104" height="68" rx="6" fill="#16213e"/>

  <!-- Active tab shape -->
  <path d="M12 30 L12 36 Q12 30 18 30 L58 30 Q64 30 66 36 L68 42 L104 42 Q110 42 110 48 L110 98 Q110 98 104 98 L18 98 Q12 98 12 92 Z" fill="#0f3460"/>
  <path d="M14 34 L14 38 Q14 32 18 32 L56 32 Q61 32 63 37 L65 42 L24 42 Q18 42 16 37 Z" fill="#e94560" opacity="0.9"/>

  <!-- Tab label dots (inactive tabs) -->
  <rect x="72" y="34" width="30" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
  <rect x="72" y="44" width="20" height="6" rx="3" fill="#ffffff" opacity="0.1"/>

  <!-- Clock face (centered at cy=72) -->
  <circle cx="62" cy="72" r="22" fill="#0a1628" stroke="#e94560" stroke-width="3"/>
  <circle cx="62" cy="72" r="2.5" fill="#e94560"/>

  <!-- Clock hands -->
  <line x1="62" y1="72" x2="52" y2="62" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="72" x2="65" y2="54" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tick marks at N/S/E/W -->
  <circle cx="62" cy="52" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="62" cy="92" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="40" cy="72" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="84" cy="72" r="1.5" fill="#ffffff" opacity="0.5"/>
</svg>
